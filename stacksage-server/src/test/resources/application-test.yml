spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

jasypt:
  encryptor:
    password: test-key

app:
  upload-dir: ./test-uploads
  rate-limit:
    enabled: false
  openai:
    api-key: ""
  async:
    analysis-pool-size: 2
    analysis-max-pool-size: 4
    analysis-queue-capacity: 50
    ai-pool-size: 2
  cleanup:
    enabled: false
